    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Is Minedit free?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "The mod itself is free and open source under the MIT license. What can cost money are the AI calls: OpenRouter bills your API key per request, and the Codex or Cursor bridge consumes your existing plan limits. Minedit prints token usage and estimated cost in chat after every generation, so nothing is hidden."
            }
          },
          {
            "@type": "Question",
            "name": "Does it work with any AI model?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Mostly, yes. Through OpenRouter you can pick from hundreds of models and switch at any time with the /model command. You can also run the local bridge and let Codex or Cursor agents handle the build using your existing login, without a separate API key."
            }
          },
          {
            "@type": "Question",
            "name": "What Minecraft version does it need?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Current releases target Minecraft 26.1.2 with NeoForge 26.1.2.73. Download the matching jar from the GitHub releases page and drop it into your mods folder."
            }
          },
          {
            "@type": "Question",
            "name": "Can the AI edit builds I made by hand?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. The /edit command reads whatever blocks are inside your selection, generated or handmade, and asks the model for changes based on what is actually there. Quick edit sends a compact snapshot so small requests come back as small patches instead of a rebuild."
            }
          },
          {
            "@type": "Question",
            "name": "What if a build ruins my world?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "You can undo it. /reset build restores the world snapshot from before the build, and Minedit keeps your last five snapshots, so you can step further back. Generated code also runs in a restricted sandbox with no Java, filesystem or network access, capped at 500k block operations and 30 seconds per run. It is still experimental software though, so back up your world before large builds."
            }
          },
          {
            "@type": "Question",
            "name": "Does it work in multiplayer?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes, Minedit is server-aware. It runs on dedicated servers, operators can cancel any player's generation, and when several players build at once the block placement budget is shared between them instead of processing one build at a time."
            }
          }
        ]
      }
